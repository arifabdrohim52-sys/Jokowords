<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://arifabdrohim52-sys.github.io/Jokowords/Invoice.html">
    <meta property="og:title" content="JOKOWORDS - Hilirisasi Dokumen">
    <meta property="og:description" content="Cek progres pesanan dan hilirisasi dokumen Anda di Jokowords.">
    <meta property="og:image" content="https://arifabdrohim52-sys.github.io/Jokowords/1.png">
    <meta property="og:image:type" content="image/png">
    <title>JOKOWORDS - Hilirisasi Dokumen</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #059669;
            --dark: #064e3b;
            --glass: rgba(255, 255, 255, 0.96);
            --border: #e2e8f0;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px 0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); 
            z-index: -1;
        }

        .wrapper { width: 95%; max-width: 500px; text-align: center; }

        .brand-header { margin-bottom: 35px; }
        .logo-box { width: 100px; height: 100px; margin: 0 auto 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        h1 { margin: 0; font-weight: 800; color: #ffffff; font-size: 34px; letter-spacing: -1px; }
        .subtitle { color: #d1d5db; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .form-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .input-wrapper { position: relative; }
        input {
            width: 100%; padding: 20px 20px 20px 60px; border: none; border-radius: 20px;
            font-size: 16px; outline: none; background: var(--glass);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-family: inherit;
        }
        .fa-user-tag { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 20px; }

        button {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 20px; border-radius: 20px; font-weight: 800; cursor: pointer;
            transition: 0.4s; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #result-container { display: none; margin-top: 30px; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .invoice-card { 
            background: var(--glass); border-radius: 28px; padding: 30px; text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Status Badge Animations */
        .status-badge { display: inline-block; padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .status-proses { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; animation: pulse-blink 1.5s infinite; }
        .status-selesai { background: #dcfce7; color: #166534; border: 1px solid #166534; animation: glow-success 2s infinite; }
        
        @keyframes pulse-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes glow-success { 0%, 100% { box-shadow: 0 0 5px #10b981; } 50% { box-shadow: 0 0 15px #10b981; } }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .value { font-size: 14px; color: var(--dark); font-weight: 700; }
        
        .service-list { grid-column: span 2; background: #f8fafc; padding: 18px; border-radius: 20px; margin: 10px 0; border: 1px solid var(--border); }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
        .detail-row:last-child { border-bottom: none; }
        .doc-name { flex: 1; font-size: 11px; font-weight: 800; color: #334155; text-transform: uppercase; }

        /* Rincian Harga */
        .price-breakdown { margin-top: 10px; font-size: 12px; }
        .price-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .price-item small { color: #94a3b8; display: block; }
        .price-divider { border-top: 2px dashed #e2e8f0; margin: 20px 0; }
        .total-section { display: flex; justify-content: space-between; align-items: flex-end; }
        .final-price { font-size: 30px; color: var(--primary); font-weight: 900; }
        
        .btn-download { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--dark); color: white; text-decoration: none; padding: 18px; border-radius: 15px; margin-top: 25px; font-weight: 800; font-size: 14px; }
        .icon-spin { animation: fa-spin 2s linear infinite; color: var(--warning); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-header">
        <div class="logo-box"><img src="2.webp" alt="Logo"></div>
        <h1>JOKOWORDS</h1>
        <p class="subtitle">HILIRISASI DOKUMEN</p>
    </div>
    
    <div class="form-group">
        <div class="input-wrapper">
            <i class="fa-solid fa-user-tag"></i>
            <input type="text" id="namaInput" placeholder="Masukkan Nama Antum...">
        </div>
        <button onclick="cariInvoice()">
            <span id="btnText">CEK PROGRES PESANAN</span>
            <div id="loader" style="display:none" class="fa-solid fa-circle-notch fa-spin"></div>
        </button>
    </div>

    <div id="result-container">
        <div class="invoice-card">
            <div id="statusBadge" class="status-badge">MEMUAT...</div>
            
            <div class="info-grid">
                <div style="grid-column: span 2;">
                    <span class="label">Nama Pemesan</span>
                    <span class="value" id="res-nama" style="font-size: 18px;">-</span>
                </div>

                <div class="service-list">
                    <span class="label" style="margin-bottom: 12px; color: var(--primary);">Detail Progres Dokumen</span>
                    <div id="res-progres-items"></div>
                </div>

                <div><span class="label">Tgl Masuk</span><span class="value" id="res-tgl-pesan">-</span></div>
                <div><span class="label">Estimasi</span><span class="value" id="res-tgl-estimasi">-</span></div>
                <div style="grid-column: span 2;"><span class="label">Tgl Selesai Realisasi</span><span class="value" id="res-tgl-riil">-</span></div>
            </div>

            <div id="price-area">
                <div class="price-divider"></div>
                <span class="label" style="color: var(--primary); margin-bottom: 10px;">Rincian Biaya</span>
                <div id="res-price-breakdown" class="price-breakdown"></div>
                
                <div class="total-section">
                    <div>
                        <span class="label">Total Tagihan</span>
                        <span id="res-harga-awal" style="text-decoration:line-through; font-size: 12px; color: #94a3b8;"></span><br>
                        <span id="res-hemat" style="color: #ef4444; font-size: 11px; font-weight: 800;"></span>
                    </div>
                    <div class="final-price" id="res-total">Rp 0</div>
                </div>
                <a href="#" id="res-link" class="btn-download"><i class="fa-solid fa-file-pdf"></i> DOWNLOAD DOKUMEN HASIL</a>
            </div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://jxjnqfhmugvhntqvmfbw.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4am5xZmhtdWd2aG50cXZtZmJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NTU2MTgsImV4cCI6MjA4NzIzMTYxOH0.6efkIZ371Re9-6uSHoAPbXqedzDNwgkcdFMcxY-KX3I";

async function cariInvoice() {
    const input = document.getElementById('namaInput').value.trim();
    if(!input) return alert("Masukkan nama Anda!");

    document.getElementById('btnText').style.display = 'none';
    document.getElementById('loader').style.display = 'inline-block';
    document.getElementById('result-container').style.display = 'none';

    try {
        const response = await fetch(`${SB_URL}/rest/v1/Jokowords?nama_pelanggan=ilike.*${input}*&select=*`, {
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
        });
        const results = await response.json();

        if (results.length > 0) {
            const data = results[0];
            const status = (data.status || "PROSES").toUpperCase();
            
            document.getElementById('res-nama').innerText = data.nama_pelanggan;
            document.getElementById('res-tgl-pesan').innerText = data.tgl_pesan || "-";
            document.getElementById('res-tgl-estimasi').innerText = data.tgl_estimasi || "-";
            document.getElementById('res-tgl-riil').innerText = data.tgl_selesai || "Sedang Diproses";

            // Status Badge
            const badge = document.getElementById('statusBadge');
            badge.innerText = status;
            badge.className = status === "SELESAI" ? "status-badge status-selesai" : "status-badge status-proses";

            // --- 1. PROGRES DOKUMEN (Logika ::) ---
            const detailStr = data.detail_status || "";
            document.getElementById('res-progres-items').innerHTML = detailStr.split('\n').map(item => {
                if(!item.trim()) return "";
                let teks = item.replace(/::|✅|⏳/g, '').trim();
                let icon = item.includes('::') || item.includes('⏳') ? 
                           '<i class="fa-solid fa-spinner icon-spin"></i>' : 
                           '<i class="fa-solid fa-circle-check" style="color:#10b981"></i>';
                return `<div class="detail-row"><span class="doc-name">${teks}</span><span>${icon}</span></div>`;
            }).join('');

            // --- 2. RINCIAN HARGA (Automasi layanan_json) ---
            const priceArea = document.getElementById('price-area');
            if (status === "SELESAI") {
                priceArea.style.display = "block";
                const listLayanan = data.layanan_json || [];
                let totalKotor = 0;
                
                let htmlHarga = listLayanan.map(item => {
                    const subtotal = (item.qty || 0) * (item.price || 0);
                    totalKotor += subtotal;
                    return `
                        <div class="price-item">
                            <div>
                                <strong>${item.desk || 'Layanan'}</strong>
                                <small>${item.qty} ${item.unit || ''} x Rp ${(item.price || 0).toLocaleString()}</small>
                            </div>
                            <span class="value">Rp ${subtotal.toLocaleString()}</span>
                        </div>`;
                }).join('');

                document.getElementById('res-price-breakdown').innerHTML = htmlHarga || "Tidak ada rincian biaya.";
                
                const diskon = data.diskon || 0;
                const totalAkhir = totalKotor - diskon;

                document.getElementById('res-harga-awal').innerText = "Rp " + totalKotor.toLocaleString();
                document.getElementById('res-hemat').innerText = diskon > 0 ? "Hemat Rp " + diskon.toLocaleString() : "";
                document.getElementById('res-total').innerText = "Rp " + totalAkhir.toLocaleString();
                document.getElementById('res-link').href = data.file_link || "#";
            } else {
                priceArea.style.display = "none";
            }

            document.getElementById('result-container').style.display = 'block';
        } else {
            alert("Nama '" + input + "' tidak ditemukan.");
        }
    } catch (e) {
        alert("Gagal memuat data. Periksa koneksi internet.");
    } finally {
        document.getElementById('btnText').style.display = 'inline-block';
        document.getElementById('loader').style.display = 'none';
    }
}
</script>
</body>
</html>
