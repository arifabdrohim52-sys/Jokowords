<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://arifabdrohim52-sys.github.io/Jokowords/Invoice.html">
    <meta property="og:title" content="JOKOWORDS - Hilirisasi Dokumen">
    <meta property="og:description" content="Cek progres pesanan dan hilirisasi dokumen Anda di Jokowords.">
    <meta property="og:image" content="https://arifabdrohim52-sys.github.io/Jokowords/1.png">
    <meta property="og:image:type" content="image/png">
    <title>JOKOWORDS - Hilirisasi Dokumen</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #059669;
            --dark: #064e3b;
            --glass: rgba(255, 255, 255, 0.96);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px 0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); 
            z-index: -1;
        }

        .wrapper {
            width: 95%; max-width: 500px;
            text-align: center;
        }

        .brand-header {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            margin-bottom: 35px;
        }

        .logo-box {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .logo-box img {
            width: 100%; height: 100%; object-fit: contain;
        }

        h1 { 
            margin: 0; font-weight: 800; color: #ffffff; 
            font-size: 34px; letter-spacing: -1px;
        }

        .subtitle { 
            color: #d1d5db; font-size: 14px; font-weight: 700; 
            margin-top: 8px; text-transform: uppercase; letter-spacing: 2px;
        }

        .form-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .input-wrapper { position: relative; }
        input {
            width: 100%; padding: 20px 20px 20px 60px;
            border: none; border-radius: 20px;
            font-size: 16px; outline: none;
            background: var(--glass);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-family: inherit;
        }
        .fa-user-tag { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 20px; }

        button {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 20px; border-radius: 20px; font-weight: 800; cursor: pointer;
            transition: 0.6s; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3);
        }
        button:hover { transform: translateY(-3px); background: #047857; }

        #result-container { display: none; margin-top: 30px; animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .invoice-card { 
            background: var(--glass); 
            border-radius: 28px; padding: 30px; 
            text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 800; margin-bottom: 20px; }
        .status-selesai { background: #dcfce7; color: #166534; }
        .status-proses { background: #fef3c7; color: #92400e; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .value { font-size: 14px; color: var(--dark); font-weight: 700; }
        .contact-box { grid-column: span 2; padding: 12px; border: 1px dashed #cbd5e1; border-radius: 12px; background: rgba(255,255,255,0.5); }
        .contact-item { font-size: 13px; color: #475569; display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
        .service-list { grid-column: span 2; background: #f1f5f9; padding: 15px; border-radius: 16px; margin: 5px 0; }
        .service-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
        .service-item:last-child { border: none; margin: 0; }
        .price-divider { border-top: 2px dashed #e2e8f0; margin: 20px 0; }
        #price-area { display: none; }
        .total-section { display: flex; justify-content: space-between; align-items: flex-end; }
        .original-price { text-decoration: line-through; color: #94a3b8; font-size: 14px; }
        .discount-badge { background: #fee2e2; color: #ef4444; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .final-price { font-size: 32px; color: var(--primary); font-weight: 900; }
        .btn-download { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--dark); color: white; text-decoration: none; padding: 20px; border-radius: 18px; margin-top: 25px; font-weight: 800; }
        
        #order-modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; text-align: center; max-width: 400px; width: 90%; animation: bounceIn 0.6s; }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-ig { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(45deg, #f09433, #bc1888); color: white; padding: 15px 25px; border-radius: 15px; text-decoration: none; font-weight: 700; margin-top: 20px; }
        .spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-header">
        <div class="logo-box">
            <img src="2.webp" alt="Logo">
        </div>
        <h1>JOKOWORDS</h1>
        <p class="subtitle">HILIRISASI DOKUMEN</p>
    </div>
    
    <div class="form-group">
        <div class="input-wrapper">
            <i class="fa-solid fa-user-tag"></i>
            <input type="text" id="namaInput" placeholder="Masukkan Nama Antum...">
        </div>
        <button onclick="cariInvoice()">
            <span id="btnText">CEK PROGRES PESANAN</span>
            <div class="spinner" id="loader"></div>
        </button>
    </div>

    <div id="result-container">
        <div class="invoice-card">
            <div id="statusBadge" class="status-badge">MEMUAT...</div>
            
            <div class="info-grid">
                <div style="grid-column: span 2;">
                    <span class="label">Nama Pemesan</span>
                    <span class="value" id="res-nama" style="font-size: 20px;">-</span>
                </div>

                <div class="contact-box">
                    <div class="contact-item"><i class="fa-solid fa-location-dot"></i> <span id="res-alamat">-</span></div>
                    <div class="contact-item"><i class="fa-solid fa-phone"></i> <span id="res-telp">-</span></div>
                </div>
                
                <div class="service-list" id="res-layanan-box">
                    <span class="label" style="margin-bottom: 10px;">Rincian Layanan</span>
                    <div id="res-layanan-items"></div>
                </div>

                <div><span class="label">Tgl Masuk</span><span class="value" id="res-tgl-pesan">-</span></div>
                <div><span class="label">Estimasi</span><span class="value" id="res-tgl-estimasi">-</span></div>
                <div style="grid-column: span 2;"><span class="label">Tanggal Selesai</span><span class="value" id="res-tgl-riil">-</span></div>
            </div>

            <div id="price-area">
                <div class="price-divider"></div>
                <div class="total-section">
                    <div>
                        <span class="label">Total Bayar</span>
                        <span class="original-price" id="res-harga-awal">Rp 0</span><br>
                        <span class="discount-badge" id="res-hemat">Diskon Rp 0</span>
                    </div>
                    <div class="final-price" id="res-total">Rp 0</div>
                </div>
                <a href="#" id="res-link" class="btn-download"><i class="fa-solid fa-file-pdf"></i> UNDUH HASIL</a>
            </div>
        </div>
    </div>
</div>

<div id="order-modal">
    <div class="modal-content">
        <h2 style="color: var(--dark); margin-bottom: 10px;">Butuh Terjemahan Lagi?</h2>
        <p style="color: #64748b; font-size: 14px;">Terima kasih sudah menggunakan Jokowords. Klik tombol di bawah untuk pesan layanan baru!</p>
        <a href="https://ig.me/m/arifabdrohim" target="_blank" class="btn-ig">
            <i class="fa-brands fa-instagram"></i> DM INSTAGRAM SEKARANG
        </a>
        <br>
        <button onclick="closeModal()" style="background:none; color:#94a3b8; margin-top:15px; border:none; cursor:pointer;">Nanti Saja</button>
    </div>
</div>

<script>
const SB_URL = "https://jxjnqfhmugvhntqvmfbw.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4am5xZmhtdWd2aG50cXZtZmJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NTU2MTgsImV4cCI6MjA4NzIzMTYxOH0.6efkIZ371Re9-6uSHoAPbXqedzDNwgkcdFMcxY-KX3I";

async function cariInvoice() {
    const input = document.getElementById('namaInput').value.trim();
    const result = document.getElementById('result-container');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    if(!input) return alert("Silakan masukkan nama Anda!");

    btnText.style.display = 'none';
    loader.style.display = 'block';
    result.style.display = 'none';

    try {
        const response = await fetch(`${SB_URL}/rest/v1/Jokowords?nama_pelanggan=ilike.*${input}*&select=*`, {
            headers: {
                "apikey": SB_KEY,
                "Authorization": `Bearer ${SB_KEY}`
            }
        });
        
        const results = await response.json();

        if (results.length > 0) {
            const data = results[0]; 
            
            document.getElementById('res-nama').innerText = data.nama_pelanggan;
            document.getElementById('res-alamat').innerText = data.alamat || "-";
            document.getElementById('res-telp').innerText = data.whatsapp || "-";
            document.getElementById('res-tgl-pesan').innerText = data.tgl_pesan || "-";
            document.getElementById('res-tgl-estimasi').innerText = data.tgl_estimasi || "-";
            document.getElementById('res-tgl-riil').innerText = data.tgl_selesai || "Sedang Diproses";

            let htmlItems = "";
            let totalAwal = 0;
            const daftarLayanan = data.layanan_json || [];

            daftarLayanan.forEach(item => {
                const subtotal = (item.qty || 0) * (item.price || 0);
                totalAwal += subtotal;
                htmlItems += `
                    <div class="service-item">
                        <div>
                            <div style="font-size:13px; font-weight:600;">${item.desk}</div>
                            <small>${item.qty} ${item.unit} x Rp ${(item.price || 0).toLocaleString()}</small>
                        </div>
                        <div style="font-weight:700; color:var(--dark);">Rp ${subtotal.toLocaleString()}</div>
                    </div>`;
            });
            document.getElementById('res-layanan-items').innerHTML = htmlItems || "Belum ada rincian jasa.";

            const badge = document.getElementById('statusBadge');
            const priceArea = document.getElementById('price-area');

            if(data.status === "Selesai") {
                badge.innerText = "SELESAI";
                badge.className = "status-badge status-selesai";
                priceArea.style.display = "block";
                
                const diskon = data.diskon || 0;
                document.getElementById('res-harga-awal').innerText = "Rp " + totalAwal.toLocaleString();
                document.getElementById('res-hemat').innerText = "Hemat Rp " + diskon.toLocaleString();
                document.getElementById('res-total').innerText = "Rp " + (totalAwal - diskon).toLocaleString();
                document.getElementById('res-link').href = data.file_link || "#";
            } else {
                badge.innerText = "SEDANG DIPROSES";
                badge.className = "status-badge status-proses";
                priceArea.style.display = "none";
            }

            result.style.display = 'block';

            // POP UP LANGSUNG MUNCUL TANPA NUNGGU SELESAI
            setTimeout(() => { 
                document.getElementById('order-modal').style.display = 'flex'; 
            }, 3000);

        } else {
            alert("Nama '" + input + "' tidak ditemukan.");
        }
    } catch (err) {
        console.error(err);
        alert("Gagal mengambil data.");
    } finally {
        loader.style.display = 'none';
        btnText.style.display = 'block';
    }
}

function closeModal() { document.getElementById('order-modal').style.display = 'none'; }
</script>

</body>
</html>
